<section class="account" aria-labelledby="account-heading">
    <h2 id="account-heading">Account Summary</h2>

    <p>Welcome to your account summary page. Here you can find an overview of your recent activities and important
        information.</p>

    <section class="recent-activities" aria-labelledby="activities-heading">
        <h3 id="activities-heading">Recent Activities</h3>
        <ul>
            <li *ngFor="let activity of recentActivities">
                <strong>{{ activity.date | date:'short' }}:</strong> {{ activity.description }}
            </li>
        </ul>
    </section>

    <section class="important-info" aria-labelledby="info-heading">
        <h3 id="info-heading">Important Information</h3>
        <p>{{ importantInfo }}</p>
    </section>


</section>
