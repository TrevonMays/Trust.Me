<section class="dashboard" aria-labelledby="dashboard-heading">
  <h2 id="dashboard-heading">Dashboard</h2>

  <div class="cards">
    <a class="card" routerLink="/patients">
      <h3>Patients</h3>
      <p class="stat">{{ stats.patients }}</p>
    </a>

    <a class="card" routerLink="/appointments">
      <h3>Today&apos;s Appointments</h3>
      <p class="stat">{{ stats.appointmentsToday }}</p>
    </a>

    <a class="card" routerLink="/encounters">
      <h3>Open Encounters</h3>
      <p class="stat">{{ stats.openEncounters }}</p>
    </a>

    <a class="card" routerLink="/medications">
      <h3>Medications</h3>
      <p class="stat">{{ stats.meds }}</p>
    </a>
  </div>

  <section class="quick-actions" aria-labelledby="qa-heading">
    <h3 id="qa-heading">Quick Actions</h3>
    <ul>
      <li><a routerLink="/appointments">Create appointment</a></li>
      <li><a routerLink="/encounters">Add encounter</a></li>
      <li><a routerLink="/patients">New patient</a></li>
    </ul>
  </section>
</section>
